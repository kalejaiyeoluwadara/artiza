<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2b38"/>
      <stop offset="0.55" stop-color="#e50914"/>
      <stop offset="1" stop-color="#b3060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
