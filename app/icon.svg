  <rect width="64" height="64" rx="14.5" fill="url(#tile)"/>
  <rect width="64" height="64" rx="14.5" fill="url(#glow)"/>
  <!-- A: monoline mark, round caps -->
  <g fill="none" stroke="#ffffff" stroke-width="6.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 15.5 L20 49"/>
    <path d="M32 15.5 L44 49"/>
